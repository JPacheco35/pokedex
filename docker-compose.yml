version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: pokedex_db
    environment:
      POSTGRES_USER: pokedex
      POSTGRES_PASSWORD: pokepass123
      POSTGRES_DB: pokedex
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: